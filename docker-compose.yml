# Exemple pour lancer Posty en local ou sur Coolify.
# L'image lance web + worker dans le même container (voir docker-entrypoint.sh),
# donc un seul service à déclarer.

services:
  posty:
    build: .
    image: posty:local
    env_file: .env
    environment:
      TZ: Europe/Paris
    ports:
      - "3000:3000"
    volumes:
      - assets:/data/assets
    restart: unless-stopped

volumes:
  assets:
